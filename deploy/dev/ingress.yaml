apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app.kubernetes.io/instance: fion-login
    app.kubernetes.io/name: fion-login
  name: fion-login
  namespace: dev
spec:
  ingressClassName: traefik
  rules:
  - host: auth.dev.fion-energy.com
    http:
      paths:
      - backend:
          service:
            name: fion-login
            port:
              number: 80
        path: /
        pathType: Prefix
