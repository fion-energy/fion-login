apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: fion-login
    app.kubernetes.io/name: fion-login
  name: fion-login
  namespace: prod
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: fion-login
      app.kubernetes.io/name: fion-login
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: fion-login
        app.kubernetes.io/name: fion-login
    spec:
      containers:
      - name: fion-login
        image: 891377298986.dkr.ecr.eu-central-1.amazonaws.com/fion-login:commit-sha-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: ZITADEL_API_URL
          value: https://production-dcufuu.zitadel.cloud
        - name: ZITADEL_SERVICE_USER_TOKEN
          valueFrom:
            secretKeyRef:
              name: fion-login-secrets
              key: service-user-token
        livenessProbe:
          httpGet:
            path: /ui/v2/login/healthy
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ui/v2/login/healthy
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: fion-login
      serviceAccountName: fion-login
      terminationGracePeriodSeconds: 30
